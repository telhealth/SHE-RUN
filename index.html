<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>안전런 - TEK Safety Racer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a14;color:#fff;font-family:'Noto Sans KR',sans-serif;overflow:hidden;height:100dvh;width:100vw;touch-action:none;user-select:none;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:24px;gap:12px;}
.screen.hidden{display:none!important;}

#startScreen{background:linear-gradient(160deg,#0a0a14 0%,#1a0a2a 50%,#0a140a 100%);}
.logo{font-family:‘Black Han Sans’,sans-serif;font-size:46px;background:linear-gradient(135deg,#ffcc00,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;text-align:center;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:4px;text-transform:uppercase;}
.car-anim{font-size:60px;animation:carb .9s ease-in-out infinite alternate;}
@keyframes carb{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.item-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:310px;}
.ichip{display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 4px;}
.ichip .ie{font-size:18px;}.ichip .il{font-size:8px;color:rgba(255,255,255,.3);text-align:center;line-height:1.4;}
.fg{width:100%;max-width:300px;}
.fg label{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:5px;}
.fg input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,204,0,.2);border-radius:10px;padding:11px 14px;color:#fff;font-size:16px;font-family:‘Noto Sans KR’,sans-serif;outline:none;}
.fg input:focus{border-color:#ffcc00;}
.btn-go{width:100%;max-width:300px;padding:15px;background:linear-gradient(135deg,#ffcc00,#ff9500);border:none;border-radius:13px;font-family:‘Black Han Sans’,sans-serif;font-size:22px;letter-spacing:2px;color:#1a0a00;cursor:pointer;box-shadow:0 4px 24px rgba(255,204,0,.3);transition:transform .1s;}
.btn-go:active{transform:scale(.96);}
.btn-lb{width:100%;max-width:300px;padding:10px;background:transparent;border:1px solid rgba(255,204,0,.25);border-radius:11px;color:#ffcc00;font-size:14px;cursor:pointer;}

#hud{position:absolute;top:0;left:0;right:0;padding:max(env(safe-area-inset-top),10px) 14px 10px;background:linear-gradient(180deg,rgba(0,0,0,.8) 0%,transparent 100%);z-index:10;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
.hud-sl{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;}
.hud-s{font-family:‘Black Han Sans’,sans-serif;font-size:28px;color:#ffcc00;text-shadow:0 0 12px rgba(255,204,0,.5);line-height:1;}
.gauges{display:flex;flex-direction:column;gap:3px;min-width:105px;}
.grow{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .3s;}
.grow.on{opacity:1;}
.gi{font-size:12px;}
.gbar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.gf{height:100%;border-radius:2px;transition:width .1s linear;}
.gf-h{background:#ffcc00;}.gf-g{background:#00d4ff;}.gf-s{background:#00ff88;}.gf-b{background:#ff6b35;}

#eventBanner{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);z-index:12;pointer-events:none;text-align:center;display:none;}
#eventBanner.show{display:block;animation:ebs .4s ease-out;}
@keyframes ebs{from{opacity:0;transform:translate(-50%,-50%) scale(.8);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}
.eb-icon{font-size:50px;}.eb-text{font-family:‘Black Han Sans’,sans-serif;font-size:20px;margin-top:4px;letter-spacing:1px;}
.eb-warn{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px;}

#fmsg{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);font-family:‘Black Han Sans’,sans-serif;font-size:20px;text-align:center;pointer-events:none;z-index:13;opacity:0;white-space:nowrap;}
#fmsg.show{animation:fu 1.1s ease-out forwards;}
@keyframes fu{0%{opacity:0;transform:translate(-50%,-50%) scale(.8);}15%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}70%{opacity:1;}100%{opacity:0;transform:translate(-50%,-70%);}}

#speedo{position:absolute;bottom:max(env(safe-area-inset-bottom),100px);right:16px;z-index:10;pointer-events:none;text-align:center;}
.spd-num{font-family:‘Black Han Sans’,sans-serif;font-size:30px;color:#ffcc00;text-shadow:0 0 10px rgba(255,204,0,.4);line-height:1;}
.spd-unit{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;}

#controls{position:absolute;bottom:max(env(safe-area-inset-bottom),16px);left:0;right:0;display:flex;justify-content:space-between;padding:0 16px;z-index:10;pointer-events:none;}
.cbtn{width:80px;height:80px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:50%;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;-webkit-user-select:none;transition:background .1s,transform .1s;}
.cbtn:active,.cbtn.pr{background:rgba(255,204,0,.18);border-color:#ffcc00;transform:scale(.9);}

#fogOv{position:absolute;inset:0;z-index:8;pointer-events:none;opacity:0;background:rgba(180,180,160,.6);transition:opacity .8s;}
#fogOv.on{opacity:1;}
#darkOv{position:absolute;inset:0;z-index:8;pointer-events:none;opacity:0;background:rgba(0,0,8,.82);transition:opacity .8s;}
#darkOv.on{opacity:1;}
#slowOv{position:absolute;inset:0;z-index:7;pointer-events:none;box-shadow:none;transition:box-shadow .3s;}
#slowOv.on{box-shadow:inset 0 0 50px rgba(255,50,50,.35);}
#hitOv{position:absolute;inset:0;z-index:9;pointer-events:none;opacity:0;background:rgba(255,45,85,.5);}

#cdWrap{position:absolute;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;pointer-events:none;}
#cdNum{font-family:‘Black Han Sans’,sans-serif;font-size:120px;color:#ffcc00;text-shadow:0 0 40px rgba(255,204,0,.6);opacity:0;}

#gameOverScreen{background:linear-gradient(180deg,#0a0a14 0%,#1a0a2a 100%);}
.go-t{font-family:‘Black Han Sans’,sans-serif;font-size:32px;color:#ff3cac;text-shadow:0 0 20px rgba(255,60,172,.5);letter-spacing:2px;}
.go-sl{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;}
.go-s{font-family:‘Black Han Sans’,sans-serif;font-size:52px;color:#ffcc00;line-height:1;}
.go-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.go-st{display:flex;flex-direction:column;align-items:center;gap:3px;}
.go-si{font-size:22px;}.go-sv{font-family:‘Black Han Sans’,sans-serif;font-size:20px;}.go-sl2{font-size:10px;color:rgba(255,255,255,.3);}
.div{width:100%;max-width:300px;height:1px;background:rgba(255,204,0,.1);}
.btn-r{width:100%;max-width:300px;padding:15px;background:linear-gradient(135deg,#ff3cac,#cc0077);border:none;border-radius:13px;font-family:‘Black Han Sans’,sans-serif;font-size:20px;letter-spacing:2px;color:#fff;cursor:pointer;transition:transform .1s;}
.btn-r:active{transform:scale(.96);}
.btn-h{width:100%;max-width:300px;padding:10px;background:transparent;border:1px solid rgba(255,255,255,.12);border-radius:11px;color:rgba(255,255,255,.35);font-size:14px;cursor:pointer;}

#lbScreen{background:linear-gradient(180deg,#0a0a14 0%,#1a0a2a 100%);overflow-y:auto;justify-content:flex-start;padding-top:50px;}
.lb-t{font-family:‘Black Han Sans’,sans-serif;font-size:26px;color:#ffcc00;letter-spacing:2px;margin-bottom:6px;}
.lbt{width:100%;max-width:340px;border-collapse:collapse;}
.lbt th{font-size:9px;color:rgba(255,255,255,.25);letter-spacing:2px;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid rgba(255,204,0,.1);text-align:left;}
.lbt td{padding:9px 10px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);}
.lbr{font-family:‘Black Han Sans’,sans-serif;font-size:15px;color:rgba(255,255,255,.25);}
.lbr.g{color:#ffd700;}.lbr.s{color:#c0c0c0;}.lbr.b{color:#cd7f32;}
.lbn{font-weight:700;}.lbd{font-size:10px;color:rgba(255,255,255,.3);}
.lbs{font-family:‘Black Han Sans’,sans-serif;color:#ffcc00;text-align:right;}
.lb-e{color:rgba(255,255,255,.25);font-size:13px;padding:20px;text-align:center;}
.btn-bk{width:100%;max-width:300px;padding:11px;background:transparent;border:1px solid rgba(255,204,0,.25);border-radius:11px;color:#ffcc00;font-size:13px;cursor:pointer;margin-top:8px;}
</style>

</head>
<body>

<div class="screen" id="startScreen">
  <div style="text-align:center">
    <div class="logo">안전런</div>
    <div class="logo-sub">TEK Safety Racer</div>
  </div>
  <div class="car-anim">🏎️</div>
  <div class="item-grid">
    <div class="ichip"><span class="ie">⛑️</span><span class="il">안전모<br>우박 대비</span></div>
    <div class="ichip"><span class="ie">🥽</span><span class="il">보안경<br>시야 확보</span></div>
    <div class="ichip"><span class="ie">🦺</span><span class="il">내화학복<br>산성비 대비</span></div>
    <div class="ichip"><span class="ie">👟</span><span class="il">안전화<br>가시밭 대비</span></div>
  </div>
  <div class="fg"><label>부서</label><input type="text" id="deptInput" placeholder="예: SHE팀" maxlength="20"></div>
  <div class="fg"><label>이름</label><input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="10"></div>
  <button class="btn-go" onclick="startGame()">🏁 출발!</button>
  <button class="btn-lb" onclick="showLB()">🏆 순위표</button>
</div>

<div class="screen hidden" id="gameScreen" style="padding:0;justify-content:flex-start;">
  <canvas id="c"></canvas>
  <div id="hud">
    <div><div class="hud-sl">SCORE</div><div class="hud-s" id="scoreTxt">0</div></div>
    <div class="gauges">
      <div class="grow" id="gH"><span class="gi">⛑️</span><div class="gbar"><div class="gf gf-h" id="fH" style="width:100%"></div></div></div>
      <div class="grow" id="gG"><span class="gi">🥽</span><div class="gbar"><div class="gf gf-g" id="fG" style="width:100%"></div></div></div>
      <div class="grow" id="gS"><span class="gi">🦺</span><div class="gbar"><div class="gf gf-s" id="fS" style="width:100%"></div></div></div>
      <div class="grow" id="gB"><span class="gi">👟</span><div class="gbar"><div class="gf gf-b" id="fB" style="width:100%"></div></div></div>
    </div>
  </div>
  <div id="eventBanner">
    <div class="eb-icon" id="ebIcon"></div>
    <div class="eb-text" id="ebText"></div>
    <div class="eb-warn" id="ebWarn"></div>
  </div>
  <div id="fmsg"></div>
  <div id="speedo"><div class="spd-num" id="spdNum">0</div><div class="spd-unit">KM/H</div></div>
  <div id="fogOv"></div>
  <div id="darkOv"></div>
  <div id="slowOv"></div>
  <div id="hitOv"></div>
  <div id="cdWrap"><div id="cdNum"></div></div>
  <div id="controls">
    <div class="cbtn" ontouchstart="kL=true" ontouchend="kL=false" onmousedown="kL=true" onmouseup="kL=false">◀</div>
    <div class="cbtn" ontouchstart="kR=true" ontouchend="kR=false" onmousedown="kR=true" onmouseup="kR=false">▶</div>
  </div>
</div>

<div class="screen hidden" id="gameOverScreen">
  <div class="go-t">🏁 레이스 종료</div>
  <div><div class="go-sl">FINAL SCORE</div><div class="go-s" id="finalScore">0</div></div>
  <div class="go-stats">
    <div class="go-st"><div class="go-si">📏</div><div class="go-sv" id="fDist">0m</div><div class="go-sl2">거리</div></div>
    <div class="go-st"><div class="go-si">⛑️</div><div class="go-sv" id="fHc">0</div><div class="go-sl2">안전모</div></div>
    <div class="go-st"><div class="go-si">🥽</div><div class="go-sv" id="fGc">0</div><div class="go-sl2">보안경</div></div>
    <div class="go-st"><div class="go-si">🦺</div><div class="go-sv" id="fSc">0</div><div class="go-sl2">내화학복</div></div>
    <div class="go-st"><div class="go-si">👟</div><div class="go-sv" id="fBc">0</div><div class="go-sl2">안전화</div></div>
  </div>
  <div class="div"></div>
  <button class="btn-r" onclick="retry()">🔄 다시 도전!</button>
  <button class="btn-h" onclick="goHome()">🏠 처음으로</button>
</div>

<div class="screen hidden" id="lbScreen">
  <div class="lb-t">🏆 명예의 전당</div>
  <table class="lbt">
    <thead><tr><th>순위</th><th>이름 / 부서</th><th style="text-align:right">점수</th></tr></thead>
    <tbody id="lbBody"></tbody>
  </table>
  <button class="btn-bk" onclick="backLB()">← 돌아가기</button>
</div>

<script>
// ================================================================
//  안전런 — 1인칭 pseudo-3D racer (segment projection)
//  핵심: 화면 하단부터 수평선까지 梯形(사다리꼴)으로 도로를 그림
// ================================================================
const C = document.getElementById('c');
const X = C.getContext('2d');
let W = 0, H = 0;

// ── 상태 ──────────────────────────────────────────────────────
let ST = 'idle'; // idle | cd | play | over
let score=0, dist=0, spd=0, pos=0;
let pX=0, tX=0;
let animId=null, lastT=0, FR=0;
let pName='', pDept='';
let iCnt={h:0,g:0,s:0,b:0};
let pw={h:false,g:false,s:false,b:false};
let pwT={h:0,g:0,s:0,b:0};
const PWD={h:15000,g:12000,s:12000,b:12000};
let kL=false, kR=false, txS=0;

// ── 이벤트 ──────────────────────────────────────────────────
const EVLIST=[
  {id:'hail', icon:'🌨️',name:'우박 주의!',   warn:'⛑️ 안전모 없으면 속도 감소!', item:'h'},
  {id:'acid', icon:'🌧️',name:'산성비 경보!', warn:'🦺 내화학복 없으면 속도 감소!',item:'s'},
  {id:'thorn',icon:'🌵',name:'가시밭 구간!', warn:'👟 안전화 없으면 속도 감소!', item:'b'},
  {id:'fog',  icon:'🌫️',name:'짙은 안개!',   warn:'🥽 보안경 없으면 속도 감소!', item:'g'},
  {id:'sand', icon:'💨',name:'모래폭풍!',    warn:'🥽 보안경 없으면 속도 감소!', item:'g'},
  {id:'dark', icon:'🌑',name:'터널 진입!',   warn:'🥽 보안경 없으면 속도 감소!', item:'g'},
];
let curEv=null, evTimer=0, evActive=false, nextEvIn=6000;
let particles=[];

// ── 도로 세그먼트 ──────────────────────────────────────────
const NSEGS=600;
let segs=[];
const ITEMS_EMO={h:'⛑️',g:'🥽',s:'🦺',b:'👟'};

function buildRoad(){
  segs=[];
  for(let i=0;i<NSEGS;i++){
    let cv=0;
    // 커브 구간
    if(i>30 &&i<90 ) cv= 2;
    if(i>120&&i<180) cv=-3;
    if(i>220&&i<290) cv= 3;
    if(i>340&&i<400) cv=-2;
    if(i>450&&i<530) cv= 4;
    if(i>580&&i<640) cv=-3;
    const alt=i%2===0;
    const seg={
      cv,
      roadCol: alt?'#222230':'#1c1c28',
      grassCol:alt?'#1e4010':'#254d14',
      rumble:  alt?'#cc2020':'#dddddd',
      itm:null
    };
    // 아이템 배치 (25~40 세그마다)
    if(i>20 && i%Math.floor(25+Math.random()*16)===0){
      const keys=['h','g','s','b'];
      const t=keys[Math.floor(Math.random()*4)];
      seg.itm={t, e:ITEMS_EMO[t], laneX:(Math.random()>.5?.35:-.35)};
    }
    segs.push(seg);
  }
}

// ── resize ──────────────────────────────────────────────────
function resize(){
  W=C.width=window.innerWidth;
  H=C.height=window.innerHeight;
}

// ── 화면 전환 ─────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function startGame(){
  pName=document.getElementById('nameInput').value.trim()||'익명';
  pDept=document.getElementById('deptInput').value.trim()||'미입력';
  show('gameScreen'); reset(); countdown();
}
function reset(){
  score=0;dist=0;spd=0;pos=0;pX=0;tX=0;FR=0;
  iCnt={h:0,g:0,s:0,b:0};
  pw={h:false,g:false,s:false,b:false};
  pwT={h:0,g:0,s:0,b:0};
  curEv=null;evTimer=0;evActive=false;nextEvIn=6000;particles=[];
  buildRoad();
  document.getElementById('scoreTxt').textContent='0';
  document.getElementById('spdNum').textContent='0';
  document.getElementById('fogOv').className='';
  document.getElementById('darkOv').className='';
  document.getElementById('slowOv').className='';
  document.getElementById('eventBanner').className='';
  updG();
}
function retry(){show('gameScreen');reset();countdown();}
function goHome(){if(animId)cancelAnimationFrame(animId);show('startScreen');}
function showLB(){show('lbScreen');renderLB();}
function backLB(){show('startScreen');}

// ── 카운트다운 ──────────────────────────────────────────────
function countdown(){
  ST='cd';
  const el=document.getElementById('cdNum');
  let n=3;
  const tick=()=>{
    el.textContent=n>0?n:'GO!';
    el.style.opacity=1;el.style.transition='none';
    setTimeout(()=>{
      el.style.transition='opacity .35s';el.style.opacity=0;
      n--;
      if(n>=0)setTimeout(tick,600);
      else{
        el.textContent='';ST='play';
        lastT=performance.now();
        animId=requestAnimationFrame(loop);
      }
    },380);
  };
  tick();
}

// ── 메인 루프 ────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min(ts-lastT,50);lastT=ts;
  if(ST!=='play')return;
  update(dt);draw();
  animId=requestAnimationFrame(loop);
}

// ── 업데이트 ─────────────────────────────────────────────────
function update(dt){
  FR++;
  // 기본 속도 (시간이 지날수록 빨라짐)
  const base=5+dist/500; 
  const cap=Math.min(base,15);

  // 이벤트 속도 페널티
  let tgtSpd=cap;
  if(evActive&&curEv&&!pw[curEv.item]){
    tgtSpd=cap*0.42;
    document.getElementById('slowOv').className='on';
  } else {
    document.getElementById('slowOv').className='';
  }
  spd+=(tgtSpd-spd)*0.05;

  // 조향
  if(kL) tX=Math.max(-1,tX-0.05*(spd/7));
  if(kR) tX=Math.min( 1,tX+0.05*(spd/7));
  pX+=(tX-pX)*0.2;
  if(Math.abs(pX)>1) spd*=0.95; // 도로 이탈 시 감속
  pX=Math.max(-1.5,Math.min(1.5,pX));

  // 전진
  pos+=spd*0.6;
  dist+=spd*0.10;
  score+=Math.floor(spd*0.65);

  // 현재 세그먼트
  const si=Math.floor(pos/200)%NSEGS;
  const seg=segs[si];

  // 커브에 의한 자동 드리프트 (커브 방향으로 밀림)
  pX+=seg.cv*0.0008*spd;

  // 아이템 충돌
  if(seg.itm){
    // laneX 기준 ±0.3 폭 안에 있으면 픽업
    if(Math.abs(pX-seg.itm.laneX)<0.38){
      activate(seg.itm.t);
      seg.itm=null;
    }
  }

  // 이벤트 타이머
  nextEvIn-=dt;
  if(nextEvIn<=0&&!evActive) triggerEvent();
  if(evActive){evTimer-=dt;if(evTimer<=0)endEvent();}

  // 보호구 타이머
  ['h','g','s','b'].forEach(k=>{
    if(pw[k]){
      pwT[k]-=dt;
      if(pwT[k]<=0){pw[k]=false;pwT[k]=0;updG();}
      else{
        const ids={h:'fH',g:'fG',s:'fS',b:'fB'};
        document.getElementById(ids[k]).style.width=(pwT[k]/PWD[k]*100)+'%';
      }
    }
  });

  // 파티클
  updateParts(dt);

  // UI
  document.getElementById('scoreTxt').textContent=score.toLocaleString();
  document.getElementById('spdNum').textContent=Math.floor(spd*16);
}

// ── 이벤트 ───────────────────────────────────────────────────
function triggerEvent(){
  curEv=EVLIST[Math.floor(Math.random()*EVLIST.length)];
  evActive=true;
  evTimer=8000+Math.random()*6000;
  nextEvIn=14000+Math.random()*10000;

  document.getElementById('ebIcon').textContent=curEv.icon;
  document.getElementById('ebText').textContent=curEv.name;
  document.getElementById('ebWarn').textContent=curEv.warn;
  const b=document.getElementById('eventBanner');
  b.className='show';
  setTimeout(()=>{b.className='';},2600);

  if(curEv.id==='fog')  document.getElementById('fogOv').className='on';
  if(curEv.id==='dark') document.getElementById('darkOv').className='on';
  spawnParts(curEv.id);
}
function endEvent(){
  evActive=false;curEv=null;
  document.getElementById('fogOv').className='';
  document.getElementById('darkOv').className='';
  document.getElementById('slowOv').className='';
  particles=particles.filter(p=>!p.ev);
}
function spawnParts(id){
  const n={hail:60,acid:70,sand:80}[id]||0;
  for(let i=0;i<n;i++) particles.push(makePart(id));
}
function makePart(id){
  const p={id,ev:true,x:Math.random()*W,y:Math.random()*H*0.7};
  if(id==='hail'){p.vx=(Math.random()-.5)*1.5;p.vy=7+Math.random()*8;p.r=1.5+Math.random()*3;p.col='rgba(180,220,255,.8)';}
  else if(id==='acid'){p.vx=(Math.random()-.5)*1;p.vy=4+Math.random()*6;p.r=1.5+Math.random()*3;p.col='rgba(80,255,80,.65)';}
  else if(id==='sand'){p.vx=4+Math.random()*6;p.vy=(Math.random()-.5)*2;p.r=1+Math.random()*2.5;p.col='rgba(210,175,70,.5)';}
  return p;
}
function updateParts(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*(dt/14);p.y+=p.vy*(dt/14);
    if(p.x<-10||p.x>W+10||p.y>H+10){
      if(evActive&&curEv&&p.id===curEv.id) Object.assign(p,makePart(p.id));
      else particles.splice(i,1);
    }
  }
}

// ── 그리기 ───────────────────────────────────────────────────
function draw(){
  X.clearRect(0,0,W,H);
  drawRoad();
  drawParts();
}

// ================================================================
//  핵심: 세그먼트 기반 pseudo-3D 도로 렌더링
//  horizon = H * 0.45  (화면 중간보다 약간 위)
//  각 세그먼트를 梯形(사다리꼴)으로 그려서 원근감 표현
// ================================================================
function drawRoad(){
  const HZ = Math.floor(H * 0.45); // 수평선 Y좌표

  // 1. 하늘 그리기
  drawSky(HZ);

  // 2. 도로 세그먼트 투영
  //    카메라는 플레이어 뒤 → 1인칭이므로 화면 중앙 기준
  //    n=0 이 가장 가까운 세그먼트, n이 클수록 멀리
  const DEPTH   = 150;   // 몇 개 세그먼트 그릴지
  const CAMZ    = 0.84;  // 카메라 깊이 (작을수록 왜곡 강함)
  const ROAD_W  = 0.5;   // 도로 반폭 (0~1 정규화)

  const startIdx = Math.floor(pos / 200) % NSEGS;
  let cameraX = pX; // 플레이어 횡방향 위치
  let cX = 0;       // 누적 커브 오프셋 (픽셀)
  let cDX = 0;      // 커브 속도

  // 앞→뒤 순서로 투영 정보 수집 후 뒤→앞으로 그림
  const proj = [];
  let maxY = H + 1;

  for(let n = 0; n < DEPTH; n++){
    const idx = (startIdx + n) % NSEGS;
    const seg = segs[idx];

    // 원근 스케일: 가까울수록 크게, 멀수록 작게
    const scale = CAMZ / (CAMZ + n / DEPTH);

    // 화면 Y좌표: 수평선에서 아래쪽으로 투영
    // n=0(가장 가까움)→ Y=H,  n=DEPTH(지평선)→ Y=HZ
    const screenY = Math.round(HZ + (H - HZ) * (1 - scale));

    if(screenY >= maxY) continue; // 이미 그린 픽셀보다 아래면 스킵
    maxY = screenY;

    // 도로 폭: 가까울수록 넓음
    const roadW = scale * W * ROAD_W;

    // 중심 X: 커브 오프셋 + 카메라 보정
    const centerX = W/2 + cX - cameraX * roadW * 2;

    proj.push({seg, n, screenY, centerX, roadW, scale});
    cX  += cDX;
    cDX += seg.cv * scale * 0.3;
  }

  // 뒤→앞으로 그리기 (painter's algorithm)
  for(let i = proj.length - 1; i >= 0; i--){
    const p  = proj[i];
    const p2 = i > 0 ? proj[i-1] : null;
    const y1 = p.screenY;
    const y2 = p2 ? p2.screenY : H;
    const h  = Math.max(1, y2 - y1);

    // ── 잔디 (도로 좌우) ──
    X.fillStyle = p.seg.grassCol;
    X.fillRect(0, y1, W, h);

    // ── 도로 본체 ──
    X.fillStyle = p.seg.roadCol;
    X.fillRect(p.centerX - p.roadW, y1, p.roadW * 2, h);

    // ── 럼블 스트립 (도로 경계 빨강/흰색) ──
    const rv = Math.max(1, p.roadW * 0.10);
    X.fillStyle = p.seg.rumble;
    X.fillRect(p.centerX - p.roadW,       y1, rv, h);
    X.fillRect(p.centerX + p.roadW - rv,  y1, rv, h);

    // ── 중앙선 (노란 점선) ──
    if(p.n % 2 === 0){
      const lw = Math.max(1, p.roadW * 0.03);
      X.fillStyle = 'rgba(255,204,0,.7)';
      X.fillRect(p.centerX - lw/2, y1, lw, Math.max(1, h * 0.55));
    }

    // ── 차선 ──
    X.fillStyle = 'rgba(255,255,255,.22)';
    const llw = Math.max(1, p.roadW * 0.018);
    X.fillRect(p.centerX - p.roadW*0.38 - llw/2, y1, llw, h);
    X.fillRect(p.centerX + p.roadW*0.38 - llw/2, y1, llw, h);

    // ── 아이템 ──
    if(p.seg.itm && h > 3){
      const it  = p.seg.itm;
      const ox  = p.centerX + it.laneX * p.roadW * 2;
      const oy  = y2;
      const sz  = Math.max(8, p.scale * 220);
      // 발광
      X.save();X.globalAlpha=0.22+0.10*Math.sin(FR*0.16);
      X.fillStyle='#00ff88';
      X.beginPath();X.arc(ox,oy-sz*.4,sz*.55,0,Math.PI*2);X.fill();
      X.restore();
      // 그림자
      X.save();X.globalAlpha=0.18;X.fillStyle='#000';
      X.beginPath();X.ellipse(ox,oy,sz*.45,sz*.10,0,0,Math.PI*2);X.fill();
      X.restore();
      X.font=sz+'px serif';X.textAlign='center';X.textBaseline='bottom';
      X.fillText(it.e,ox,oy+2);
    }
  }

  // 3. 수평선 경계선
  X.fillStyle='#050508';
  X.fillRect(0, HZ-1, W, 2);
}

function drawSky(hz){
  // 이벤트에 따른 하늘 색
  let c0='#08081a',c1='#14143a',c2='#201830';
  if(evActive&&curEv){
    if(curEv.id==='hail') {c0='#182030';c1='#283848';c2='#3a4858';}
    if(curEv.id==='acid') {c0='#081408';c1='#143014';c2='#204020';}
    if(curEv.id==='thorn'){c0='#181008';c1='#382010';c2='#502810';}
    if(curEv.id==='fog')  {c0='#282828';c1='#3a3a38';c2='#484844';}
    if(curEv.id==='sand') {c0='#281808';c1='#482808';c2='#603008';}
    if(curEv.id==='dark') {c0='#000004';c1='#000008';c2='#00000c';}
  }
  const g=X.createLinearGradient(0,0,0,hz);
  g.addColorStop(0,c0);g.addColorStop(0.6,c1);g.addColorStop(1,c2);
  X.fillStyle=g;X.fillRect(0,0,W,hz);

  // 별 (안개/모래/어둠 아닐 때)
  if(!evActive||!['fog','sand','dark'].includes(curEv?.id)){
    X.fillStyle='rgba(255,255,255,.6)';
    for(let i=0;i<28;i++){
      const sx=(i*7919)%W, sy=(i*5381)%(hz*.82);
      X.beginPath();X.arc(sx,sy,i%5===0?1.3:.6,0,Math.PI*2);X.fill();
    }
    // 달빛
    const gr=X.createRadialGradient(W*.72,hz*.22,0,W*.72,hz*.22,50);
    gr.addColorStop(0,'rgba(255,220,100,.4)');gr.addColorStop(1,'transparent');
    X.fillStyle=gr;X.fillRect(0,0,W,hz);
  }
}

function drawParts(){
  for(const p of particles){
    X.save();X.globalAlpha=.72;X.fillStyle=p.col;
    X.beginPath();
    if(p.id==='hail') X.ellipse(p.x,p.y,p.r*.4,p.r,0,0,Math.PI*2);
    else X.arc(p.x,p.y,p.r,0,Math.PI*2);
    X.fill();X.restore();
  }
}

// ── 보호구 ───────────────────────────────────────────────────
function activate(t){
  pw[t]=true;iCnt[t]++;pwT[t]=PWD[t];
  const m={h:'⛑️ 안전모 장착!',g:'🥽 보안경 장착!',s:'🦺 내화학복 장착!',b:'👟 안전화 장착!'};
  const c={h:'#ffcc00',g:'#00d4ff',s:'#00ff88',b:'#ff6b35'};
  showMsg(m[t],c[t]);updG();
}
function updG(){
  const mp={h:['gH','fH'],g:['gG','fG'],s:['gS','fS'],b:['gB','fB']};
  Object.entries(mp).forEach(([k,[g,f]])=>{
    document.getElementById(g).classList.toggle('on',pw[k]);
    if(!pw[k])document.getElementById(f).style.width='100%';
  });
}
function showMsg(txt,col){
  const el=document.getElementById('fmsg');
  el.textContent=txt;el.style.color=col;el.style.textShadow='0 0 16px '+col+'99';
  el.className='';void el.offsetWidth;el.className='show';
  setTimeout(()=>el.className='',1200);
}
function flash(col){
  const o=document.getElementById('hitOv');
  o.style.background=col;o.style.opacity=1;o.style.transition='none';
  setTimeout(()=>{o.style.transition='opacity .4s';o.style.opacity=0;},80);
}

// ── 게임 종료 ─────────────────────────────────────────────────
function gameOver(){
  ST='over';if(animId)cancelAnimationFrame(animId);
  flash('rgba(255,45,85,.5)');
  saveLoc(pName,pDept,score);
  if(typeof window.fbSave==='function')window.fbSave(pName,pDept,score);
  setTimeout(()=>{
    document.getElementById('finalScore').textContent=score.toLocaleString();
    document.getElementById('fDist').textContent=Math.floor(dist)+'m';
    ['Hc','Gc','Sc','Bc'].forEach((k,i)=>
      document.getElementById('f'+k).textContent=[iCnt.h,iCnt.g,iCnt.s,iCnt.b][i]);
    show('gameOverScreen');
  },500);
}

// ── 저장 ─────────────────────────────────────────────────────
function saveLoc(n,d,s){
  try{const k='sr4';const a=JSON.parse(localStorage.getItem(k)||'[]');
  a.push({name:n,dept:d,score:s});a.sort((x,y)=>y.score-x.score);
  localStorage.setItem(k,JSON.stringify(a.slice(0,10)));}catch(e){}
}
function getLoc(){try{return JSON.parse(localStorage.getItem('sr4')||'[]');}catch(e){return[];}}
async function renderLB(){
  const tb=document.getElementById('lbBody');tb.innerHTML='';
  const list=typeof window.fbLoad==='function'?await window.fbLoad():getLoc();
  if(!list.length){tb.innerHTML='<tr><td colspan="3" class="lb-e">아직 기록 없음 🏁</td></tr>';return;}
  list.forEach((s,i)=>{
    const rc=i<3?['g','s','b'][i]:'';
    const md=i<3?['🥇','🥈','🥉'][i]:i+1;
    const tr=document.createElement('tr');
    tr.innerHTML='<td class="lbr '+rc+'">'+md+'</td><td><div class="lbn">'+s.name+'</div><div class="lbd">'+s.dept+'</div></td><td class="lbs">'+s.score.toLocaleString()+'</td>';
    tb.appendChild(tr);
  });
}

// ── 입력 ─────────────────────────────────────────────────────
C.addEventListener('touchstart',e=>{txS=e.touches[0].clientX;},{passive:true});
C.addEventListener('touchmove',e=>{
  if(ST!=='play')return;
  const dx=e.touches[0].clientX-txS;
  if(Math.abs(dx)>8){tX=Math.max(-1,Math.min(1,tX+(dx>0?.3:-.3)));txS=e.touches[0].clientX;}
},{passive:true});
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')kL=true;if(e.key==='ArrowRight')kR=true;});
window.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')kL=false;if(e.key==='ArrowRight')kR=false;});

// ── 초기화 ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  resize();
  window.addEventListener('resize',resize);
  buildRoad();
});
</script>
