<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>안전런 - TEK Safety Racer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#1a0a2e;color:#fff;font-family:'Noto Sans KR',sans-serif;overflow:hidden;height:100dvh;width:100vw;touch-action:none;user-select:none;}
#threeCanvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:24px;gap:11px;}
.screen.hidden{display:none!important;}

/* 시작화면 */
#startScreen{background:linear-gradient(160deg,#1a0533 0%,#2d0a4e 50%,#0a1a1a 100%);}
.logo{font-family:‘Black Han Sans’,sans-serif;font-size:46px;background:linear-gradient(135deg,#ffdd00,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;text-align:center;filter:drop-shadow(0 0 20px rgba(255,200,0,.3));}
.logo-sub{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:4px;text-transform:uppercase;}
.car-anim{font-size:64px;animation:carb .9s ease-in-out infinite alternate;filter:drop-shadow(0 6px 16px rgba(255,150,0,.4));}
@keyframes carb{from{transform:translateY(0) rotate(-2deg);}to{transform:translateY(-10px) rotate(2deg);}}
.item-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:310px;}
.ichip{display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 4px;}
.ichip .ie{font-size:18px;}.ichip .il{font-size:8px;color:rgba(255,255,255,.4);text-align:center;line-height:1.4;}
.fg{width:100%;max-width:300px;}
.fg label{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:5px;}
.fg input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,220,0,.25);border-radius:10px;padding:11px 14px;color:#fff;font-size:16px;font-family:‘Noto Sans KR’,sans-serif;outline:none;}
.fg input:focus{border-color:#ffdd00;}
.btn-go{width:100%;max-width:300px;padding:15px;background:linear-gradient(135deg,#ffdd00,#ff9500);border:none;border-radius:16px;font-family:‘Black Han Sans’,sans-serif;font-size:22px;letter-spacing:2px;color:#2a0a00;cursor:pointer;box-shadow:0 4px 24px rgba(255,200,0,.35);transition:transform .1s;}
.btn-go:active{transform:scale(.96);}
.btn-lb{width:100%;max-width:300px;padding:10px;background:transparent;border:1px solid rgba(255,220,0,.3);border-radius:12px;color:#ffdd00;font-size:14px;cursor:pointer;}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;padding:max(env(safe-area-inset-top),10px) 14px 10px;background:linear-gradient(180deg,rgba(0,0,0,.65) 0%,transparent 100%);z-index:10;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
.hud-sl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;}
.hud-s{font-family:‘Black Han Sans’,sans-serif;font-size:28px;color:#ffdd00;text-shadow:0 0 14px rgba(255,220,0,.6);line-height:1;}
.hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
/* HP */
.hp-row{display:flex;gap:4px;justify-content:flex-end;}
.hp-heart{font-size:22px;transition:all .3s;}
.hp-heart.empty{filter:grayscale(1);opacity:.3;}
/* 게이지 */
.gauges{display:flex;flex-direction:column;gap:3px;min-width:108px;}
.grow{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .3s;}
.grow.on{opacity:1;}
.gi{font-size:13px;}
.gbar{flex:1;height:5px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden;}
.gf{height:100%;border-radius:3px;transition:width .1s linear;}
.gf-h{background:#ffdd00;}.gf-g{background:#00d4ff;}.gf-s{background:#00ff88;}.gf-b{background:#ff6b35;}

/* 이벤트 배너 */
#evBanner{position:absolute;top:18%;left:50%;transform:translateX(-50%);z-index:12;pointer-events:none;text-align:center;opacity:0;transition:opacity .4s;}
#evBanner.show{opacity:1;}
.eb-icon{font-size:52px;}.eb-txt{font-family:‘Black Han Sans’,sans-serif;font-size:22px;margin-top:4px;letter-spacing:1px;text-shadow:0 2px 10px rgba(0,0,0,.9);}
.eb-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px;text-shadow:0 1px 5px rgba(0,0,0,.9);}

/* 플로팅 메시지 */
#fmsg{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-family:‘Black Han Sans’,sans-serif;font-size:22px;text-align:center;pointer-events:none;z-index:13;opacity:0;white-space:nowrap;}
#fmsg.show{animation:fu 1.1s ease-out forwards;}
@keyframes fu{0%{opacity:0;transform:translate(-50%,-50%) scale(.8);}15%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}70%{opacity:1;}100%{opacity:0;transform:translate(-50%,-75%);}}

/* 속도계 */
#speedo{position:absolute;bottom:max(env(safe-area-inset-bottom),130px);right:18px;z-index:10;pointer-events:none;text-align:center;}
.spd-n{font-family:‘Black Han Sans’,sans-serif;font-size:30px;color:#ffdd00;text-shadow:0 0 12px rgba(255,220,0,.5);line-height:1;}
.spd-u{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;}

/* 조작 버튼 */
#controls{position:absolute;bottom:max(env(safe-area-inset-bottom),14px);left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 20px;z-index:10;pointer-events:none;}
.ctrl-btn{width:100px;height:90px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:20px;font-size:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;-webkit-user-select:none;transition:background .1s,transform .1s;backdrop-filter:blur(4px);}
.ctrl-btn.pressed,.ctrl-btn:active{background:rgba(255,220,0,.25);border-color:#ffdd00;transform:scale(.93);}
.ctrl-center{width:80px;text-align:center;pointer-events:none;}

/* 핸들 표시 */
#wheelDisp{font-size:42px;transition:transform .15s;}

/* 오버레이 */
#slowOv{position:absolute;inset:0;z-index:7;pointer-events:none;box-shadow:none;transition:box-shadow .3s;}
#slowOv.on{box-shadow:inset 0 0 80px rgba(255,50,50,.5);}
#hitOv{position:absolute;inset:0;z-index:9;pointer-events:none;opacity:0;}
#hitOv.flash{animation:hitflash .5s ease-out forwards;}
@keyframes hitflash{0%{opacity:1;background:rgba(255,50,50,.5);}100%{opacity:0;background:transparent;}}

/* 카운트다운 */
#cdWrap{position:absolute;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;pointer-events:none;}
#cdNum{font-family:‘Black Han Sans’,sans-serif;font-size:120px;color:#ffdd00;text-shadow:0 0 40px rgba(255,220,0,.7);opacity:0;}

/* 게임오버 */
#gameOverScreen{background:linear-gradient(180deg,#1a0533 0%,#2d0a4e 100%);}
.go-t{font-family:‘Black Han Sans’,sans-serif;font-size:32px;color:#ff3cac;letter-spacing:2px;text-shadow:0 0 20px rgba(255,60,172,.5);}
.go-sl{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;}
.go-s{font-family:‘Black Han Sans’,sans-serif;font-size:52px;color:#ffdd00;line-height:1;}
.go-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.go-st{display:flex;flex-direction:column;align-items:center;gap:3px;}
.go-si{font-size:22px;}.go-sv{font-family:‘Black Han Sans’,sans-serif;font-size:20px;}.go-sl2{font-size:10px;color:rgba(255,255,255,.3);}
.div{width:100%;max-width:300px;height:1px;background:rgba(255,220,0,.12);}
.btn-r{width:100%;max-width:300px;padding:15px;background:linear-gradient(135deg,#ff3cac,#cc0077);border:none;border-radius:14px;font-family:‘Black Han Sans’,sans-serif;font-size:20px;letter-spacing:2px;color:#fff;cursor:pointer;transition:transform .1s;}
.btn-r:active{transform:scale(.96);}
.btn-h{width:100%;max-width:300px;padding:10px;background:transparent;border:1px solid rgba(255,255,255,.12);border-radius:11px;color:rgba(255,255,255,.35);font-size:14px;cursor:pointer;}

/* 리더보드 */
#lbScreen{background:linear-gradient(180deg,#1a0533 0%,#2d0a4e 100%);overflow-y:auto;justify-content:flex-start;padding-top:50px;}
.lb-t{font-family:‘Black Han Sans’,sans-serif;font-size:26px;color:#ffdd00;letter-spacing:2px;margin-bottom:6px;}
.lbt{width:100%;max-width:340px;border-collapse:collapse;}
.lbt th{font-size:9px;color:rgba(255,255,255,.25);letter-spacing:2px;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid rgba(255,220,0,.12);text-align:left;}
.lbt td{padding:9px 10px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);}
.lbr{font-family:‘Black Han Sans’,sans-serif;font-size:15px;color:rgba(255,255,255,.25);}
.lbr.g{color:#ffd700;}.lbr.s{color:#c0c0c0;}.lbr.b{color:#cd7f32;}
.lbn{font-weight:700;}.lbd{font-size:10px;color:rgba(255,255,255,.3);}
.lbs{font-family:‘Black Han Sans’,sans-serif;color:#ffdd00;text-align:right;}
.lb-e{color:rgba(255,255,255,.25);font-size:13px;padding:20px;text-align:center;}
.btn-bk{width:100%;max-width:300px;padding:11px;background:transparent;border:1px solid rgba(255,220,0,.25);border-radius:11px;color:#ffdd00;font-size:13px;cursor:pointer;margin-top:8px;}
</style>

</head>
<body>

<!-- 시작 -->

<div class="screen" id="startScreen">
  <div style="text-align:center"><div class="logo">🏎️ 안전런</div><div class="logo-sub">TEK Safety Racer</div></div>
  <div class="item-grid">
    <div class="ichip"><span class="ie">⛑️</span><span class="il">안전모<br>우박 대비</span></div>
    <div class="ichip"><span class="ie">🥽</span><span class="il">보안경<br>시야 확보</span></div>
    <div class="ichip"><span class="ie">🦺</span><span class="il">내화학복<br>산성비 대비</span></div>
    <div class="ichip"><span class="ie">👟</span><span class="il">안전화<br>가시밭 대비</span></div>
  </div>
  <div class="fg"><label>부서</label><input type="text" id="deptInput" placeholder="예: SHE팀" maxlength="20"></div>
  <div class="fg"><label>이름</label><input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="10"></div>
  <button class="btn-go" onclick="startGame()">🏁 출발!</button>
  <button class="btn-lb" onclick="showLB()">🏆 순위표</button>
</div>

<!-- 게임 -->

<div class="screen hidden" id="gameScreen" style="padding:0;justify-content:flex-start;">
  <canvas id="threeCanvas"></canvas>
  <div id="hud">
    <div><div class="hud-sl">SCORE</div><div class="hud-s" id="scoreTxt">0</div></div>
    <div class="hud-right">
      <div class="hp-row" id="hpRow">
        <span class="hp-heart" id="hp2">❤️</span>
        <span class="hp-heart" id="hp1">❤️</span>
        <span class="hp-heart" id="hp0">❤️</span>
      </div>
      <div class="gauges">
        <div class="grow" id="gH"><span class="gi">⛑️</span><div class="gbar"><div class="gf gf-h" id="fH" style="width:100%"></div></div></div>
        <div class="grow" id="gG"><span class="gi">🥽</span><div class="gbar"><div class="gf gf-g" id="fG" style="width:100%"></div></div></div>
        <div class="grow" id="gS"><span class="gi">🦺</span><div class="gbar"><div class="gf gf-s" id="fS" style="width:100%"></div></div></div>
        <div class="grow" id="gB"><span class="gi">👟</span><div class="gbar"><div class="gf gf-b" id="fB" style="width:100%"></div></div></div>
      </div>
    </div>
  </div>
  <div id="evBanner"><div class="eb-icon" id="ebIcon"></div><div class="eb-txt" id="ebTxt"></div><div class="eb-sub" id="ebSub"></div></div>
  <div id="fmsg"></div>
  <div id="speedo"><div class="spd-n" id="spdNum">0</div><div class="spd-u">KM/H</div></div>
  <div id="slowOv"></div>
  <div id="hitOv"></div>
  <div id="cdWrap"><div id="cdNum"></div></div>
  <!-- 좌우 버튼 + 중앙 핸들 -->
  <div id="controls">
    <div class="ctrl-btn" id="btnL">◀</div>
    <div class="ctrl-center"><div id="wheelDisp">🎡</div></div>
    <div class="ctrl-btn" id="btnR">▶</div>
  </div>
</div>

<!-- 게임오버 -->

<div class="screen hidden" id="gameOverScreen">
  <div class="go-t">💥 GAME OVER</div>
  <div><div class="go-sl">FINAL SCORE</div><div class="go-s" id="finalScore">0</div></div>
  <div class="go-stats">
    <div class="go-st"><div class="go-si">📏</div><div class="go-sv" id="fDist">0m</div><div class="go-sl2">거리</div></div>
    <div class="go-st"><div class="go-si">⛑️</div><div class="go-sv" id="fHc">0</div><div class="go-sl2">안전모</div></div>
    <div class="go-st"><div class="go-si">🥽</div><div class="go-sv" id="fGc">0</div><div class="go-sl2">보안경</div></div>
    <div class="go-st"><div class="go-si">🦺</div><div class="go-sv" id="fSc">0</div><div class="go-sl2">내화학복</div></div>
    <div class="go-st"><div class="go-si">👟</div><div class="go-sv" id="fBc">0</div><div class="go-sl2">안전화</div></div>
  </div>
  <div class="div"></div>
  <button class="btn-r" onclick="retry()">🔄 다시 도전!</button>
  <button class="btn-h" onclick="goHome()">🏠 처음으로</button>
</div>

<!-- 리더보드 -->

<div class="screen hidden" id="lbScreen">
  <div class="lb-t">🏆 명예의 전당</div>
  <table class="lbt">
    <thead><tr><th>순위</th><th>이름 / 부서</th><th style="text-align:right">점수</th></tr></thead>
    <tbody id="lbBody"></tbody>
  </table>
  <button class="btn-bk" onclick="backLB()">← 돌아가기</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ================================================================
//  안전런 v4 — Three.js 3D / 마리오카트 스타일
//  · 좌우 버튼 누르고 있으면 이동 (직관적 조작)
//  · 귀여운 파스텔 색감
//  · HP 3개 시스템
//  · 장애물 6종 + 아이템 4종
// ================================================================

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('threeCanvas'),antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,1,0.1,500);

// ── 상태 ──────────────────────────────────────────────────────
let ST='idle';
let score=0,dist=0,spd=0,pos=0;
let carX=0,tCarX=0;
let hp=3;
let invincible=false,invTimer=0; // 무적 시간 (피격 후)
let animId=null,lastT=0,FR=0;
let pName='',pDept='';
let iCnt={h:0,g:0,s:0,b:0};
let pw={h:false,g:false,s:false,b:false};
let pwT={h:0,g:0,s:0,b:0};
const PWD={h:15000,g:12000,s:12000,b:12000};
let kL=false,kR=false;

// ── 이벤트 ────────────────────────────────────────────────────
const EVLIST=[
  {id:'hail', icon:'🌨️',name:'우박 주의!',   warn:'⛑️ 안전모 없으면 속도 감소!',item:'h'},
  {id:'acid', icon:'🌧️',name:'산성비 경보!', warn:'🦺 내화학복 없으면 속도 감소!',item:'s'},
  {id:'thorn',icon:'🌵',name:'가시밭 구간!', warn:'👟 안전화 없으면 속도 감소!',item:'b'},
  {id:'fog',  icon:'🌫️',name:'짙은 안개!',   warn:'🥽 보안경 없으면 속도 감소!',item:'g'},
  {id:'sand', icon:'💨',name:'모래폭풍!',    warn:'🥽 보안경 없으면 속도 감소!',item:'g'},
  {id:'dark', icon:'🌑',name:'터널 진입!',   warn:'🥽 보안경 없으면 속도 감소!',item:'g'},
];
let curEv=null,evTimer=0,evActive=false,nextEvIn=9000;

// ── 도로/오브젝트 ──────────────────────────────────────────────
const ROAD_W=14, TILE_LEN=22, NUM_TILES=28;
let roadTiles=[],carMesh=null;
let weatherPts=null;
let curvePow=0,curveT=0,curveDur=4000;

// 아이템 / 장애물 타입
const ITEM_KEYS=['h','g','s','b'];
const ITEM_EMO={h:'⛑️',g:'🥽',s:'🦺',b:'👟'};
const OBS_LIST=[
  {id:'drum',  e:'🛢️', color:0xff4422},
  {id:'cone',  e:'🚧', color:0xff8800},
  {id:'box',   e:'📦', color:0xcc8844},
  {id:'smombie',e:'🧟',color:0x44cc44},
  {id:'barrel',e:'⚙️', color:0x888888},
  {id:'sign',  e:'⛔', color:0xff2222},
];

// ── 씬 빌드 ───────────────────────────────────────────────────
function buildScene(){
  // 기존 오브젝트 제거
  while(scene.children.length) scene.remove(scene.children[0]);

  scene.background=new THREE.Color(0x1a0a3a);
  scene.fog=new THREE.Fog(0x1a0a3a,90,260);

  // 조명
  scene.add(new THREE.AmbientLight(0xffffff,0.8));
  const sun=new THREE.DirectionalLight(0xffeedd,1.4);
  sun.position.set(20,60,-10);
  scene.add(sun);

  // 넓은 잔디
  const gGeo=new THREE.PlaneGeometry(600,600);
  const gMat=new THREE.MeshLambertMaterial({color:0x44bb22});
  const grass=new THREE.Mesh(gGeo,gMat);
  grass.rotation.x=-Math.PI/2; grass.position.y=-0.05;
  scene.add(grass);

  // 별
  const sverts=[];
  for(let i=0;i<400;i++) sverts.push((Math.random()-.5)*500,25+Math.random()*80,(Math.random()-.5)*500);
  const sgeo=new THREE.BufferGeometry();
  sgeo.setAttribute('position',new THREE.Float32BufferAttribute(sverts,3));
  scene.add(new THREE.Points(sgeo,new THREE.PointsMaterial({color:0xffffff,size:0.5})));

  // 도로 타일
  roadTiles=[];
  for(let i=0;i<NUM_TILES;i++){
    const t=makeRoadTile(i);
    scene.add(t);
    roadTiles.push(t);
  }

  // 차량
  carMesh=makeCar();
  scene.add(carMesh);
}

function makeRoadTile(idx){
  const g=new THREE.Group();

  // 아스팔트 (약간 보라빛 도는 어두운 색)
  const rg=new THREE.PlaneGeometry(ROAD_W,TILE_LEN);
  const rm=new THREE.MeshLambertMaterial({color:0x2a2035});
  const r=new THREE.Mesh(rg,rm); r.rotation.x=-Math.PI/2; g.add(r);

  // 도로 좌우 연석 (귀여운 파스텔 핑크/흰색 교차)
  const cColor=idx%2===0?0xff9999:0xffffff;
  const cMat=new THREE.MeshLambertMaterial({color:cColor});
  [-ROAD_W/2-0.5, ROAD_W/2+0.1].forEach(cx=>{
    const cg=new THREE.BoxGeometry(0.8,0.3,TILE_LEN);
    const cm=new THREE.Mesh(cg,cMat);
    cm.position.set(cx+0.3,0.15,0); g.add(cm);
  });

  // 중앙 점선
  if(idx%2===0){
    const lg=new THREE.PlaneGeometry(0.22,TILE_LEN*0.5);
    const lm=new THREE.MeshBasicMaterial({color:0xffeeaa});
    const l=new THREE.Mesh(lg,lm); l.rotation.x=-Math.PI/2; l.position.y=0.01; g.add(l);
  }

  g.position.z=-idx*TILE_LEN;
  g.userData={itemMesh:null,obsMesh:null,itemType:null,obsId:null,obsX:0,itemX:0,itemActive:false,obsActive:false};
  return g;
}

function makeCar(){
  const g=new THREE.Group();

  // 차체 (둥글고 귀엽게 — BoxGeometry지만 색으로 귀엽게)
  const bodyG=new THREE.BoxGeometry(2.2,0.7,3.8);
  const bodyM=new THREE.MeshLambertMaterial({color:0xff6688}); // 핑크!
  const body=new THREE.Mesh(bodyG,bodyM);
  body.position.y=0.6; g.add(body);

  // 지붕 (하늘색)
  const roofG=new THREE.BoxGeometry(1.8,0.55,2.0);
  const roofM=new THREE.MeshLambertMaterial({color:0x88ddff});
  const roof=new THREE.Mesh(roofG,roofM);
  roof.position.set(0,1.18,-0.1); g.add(roof);

  // 앞 유리 (반투명)
  const wgG=new THREE.PlaneGeometry(1.6,0.5);
  const wgM=new THREE.MeshBasicMaterial({color:0xaaeeff,transparent:true,opacity:0.6,side:THREE.DoubleSide});
  const wg=new THREE.Mesh(wgG,wgM);
  wg.position.set(0,1.15,0.92); wg.rotation.x=Math.PI*0.1; g.add(wg);

  // 바퀴 (검정 + 노란 휠캡)
  const wGeo=new THREE.CylinderGeometry(0.42,0.42,0.32,16);
  const wMat=new THREE.MeshLambertMaterial({color:0x222222});
  const capGeo=new THREE.CylinderGeometry(0.2,0.2,0.33,12);
  const capMat=new THREE.MeshBasicMaterial({color:0xffdd00});
  [[-1.2,0.42,1.3],[1.2,0.42,1.3],[-1.2,0.42,-1.3],[1.2,0.42,-1.3]].forEach(([wx,wy,wz])=>{
    const w=new THREE.Mesh(wGeo,wMat); w.rotation.z=Math.PI/2;
    w.position.set(wx,wy,wz); g.add(w);
    const cap=new THREE.Mesh(capGeo,capMat); cap.rotation.z=Math.PI/2;
    cap.position.set(wx>0?wx+0.17:wx-0.17,wy,wz); g.add(cap);
  });

  // 헤드라이트 (노란 동그라미)
  const hlG=new THREE.CircleGeometry(0.22,12);
  const hlM=new THREE.MeshBasicMaterial({color:0xffffaa});
  [[-0.65,0.62],[0.65,0.62]].forEach(([hx,hy])=>{
    const hl=new THREE.Mesh(hlG,hlM);
    hl.position.set(hx,hy,1.92); g.add(hl);
  });

  // 귀여운 눈 스티커 느낌 (앞면 작은 원)
  const eyeG=new THREE.CircleGeometry(0.12,10);
  const eyeM=new THREE.MeshBasicMaterial({color:0xffffff});
  [[-0.4,1.0],[0.4,1.0]].forEach(([ex,ey])=>{
    const eye=new THREE.Mesh(eyeG,eyeM);
    eye.position.set(ex,ey,1.93); g.add(eye);
    const pupilG=new THREE.CircleGeometry(0.06,8);
    const pupilM=new THREE.MeshBasicMaterial({color:0x222222});
    const pupil=new THREE.Mesh(pupilG,pupilM);
    pupil.position.set(ex,ey,1.94); g.add(pupil);
  });

  g.position.set(0,0,5);
  return g;
}

// ── 캔버스 텍스처로 이모지 스프라이트 ──────────────────────────
function makeEmojiSprite(emoji, bgColor='rgba(0,0,0,0.55)', border='#00ff88', size=2.6){
  const cv=document.createElement('canvas');
  cv.width=128;cv.height=128;
  const cx=cv.getContext('2d');
  cx.beginPath();cx.arc(64,64,58,0,Math.PI*2);
  cx.fillStyle=bgColor;cx.fill();
  cx.strokeStyle=border;cx.lineWidth=7;cx.stroke();
  cx.font='54px serif';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(emoji,64,70);
  const tex=new THREE.CanvasTexture(cv);
  const geo=new THREE.PlaneGeometry(size,size);
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
  return new THREE.Mesh(geo,mat);
}

// ── 아이템/장애물 배치 ────────────────────────────────────────
function placeTileObjects(tile){
  // 기존 제거
  if(tile.userData.itemMesh){tile.remove(tile.userData.itemMesh);tile.userData.itemMesh=null;tile.userData.itemActive=false;}
  if(tile.userData.obsMesh){tile.remove(tile.userData.obsMesh);tile.userData.obsMesh=null;tile.userData.obsActive=false;}

  const r=Math.random();
  if(r<0.25){ // 25% 아이템
    const t=ITEM_KEYS[Math.floor(Math.random()*4)];
    const m=makeEmojiSprite(ITEM_EMO[t],'rgba(0,0,0,0.55)','#00ff88',3.0);
    const lx=(Math.random()>0.5?1:-1)*(2+Math.random()*2);
    m.position.set(lx,1.6,0);
    tile.add(m);
    tile.userData.itemMesh=m;tile.userData.itemType=t;tile.userData.itemX=lx;tile.userData.itemActive=true;
  } else if(r<0.55){ // 30% 장애물
    const obs=OBS_LIST[Math.floor(Math.random()*OBS_LIST.length)];
    const m=makeEmojiSprite(obs.e,'rgba(20,0,0,0.65)','#ff4444',3.2);
    const lx=(Math.random()-.5)*10;
    m.position.set(lx,1.6,0);
    tile.add(m);
    tile.userData.obsMesh=m;tile.userData.obsId=obs.id;tile.userData.obsX=lx;tile.userData.obsActive=true;
  }
}

// ── resize ─────────────────────────────────────────────────────
function resize(){
  const W=window.innerWidth,H=window.innerHeight;
  renderer.setSize(W,H);
  camera.aspect=W/H;
  camera.updateProjectionMatrix();
}

// ── 화면 ──────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function startGame(){
  pName=document.getElementById('nameInput').value.trim()||'익명';
  pDept=document.getElementById('deptInput').value.trim()||'미입력';
  show('gameScreen'); buildScene(); reset(); countdown();
}
function reset(){
  score=0;dist=0;spd=0;pos=0;carX=0;tCarX=0;FR=0;hp=3;
  invincible=false;invTimer=0;
  iCnt={h:0,g:0,s:0,b:0};
  pw={h:false,g:false,s:false,b:false};
  pwT={h:0,g:0,s:0,b:0};
  curEv=null;evTimer=0;evActive=false;nextEvIn=9000;
  curvePow=0;curveT=0;
  document.getElementById('scoreTxt').textContent='0';
  document.getElementById('spdNum').textContent='0';
  document.getElementById('slowOv').className='';
  document.getElementById('evBanner').className='';
  document.getElementById('hitOv').className='';
  updateHP();updG();
}
function retry(){show('gameScreen');buildScene();reset();countdown();}
function goHome(){if(animId)cancelAnimationFrame(animId);show('startScreen');}
function showLB(){show('lbScreen');renderLB();}
function backLB(){show('startScreen');}

// ── HP ────────────────────────────────────────────────────────
function updateHP(){
  for(let i=0;i<3;i++){
    const el=document.getElementById('hp'+i);
    el.classList.toggle('empty',i>=hp);
  }
}
function loseHP(){
  if(invincible)return;
  hp--;updateHP();
  invincible=true;invTimer=2000;
  showMsg('💥 충돌!','#ff4444');
  const o=document.getElementById('hitOv');
  o.className='';void o.offsetWidth;o.className='flash';
  if(hp<=0){setTimeout(()=>gameOver(),600);}
}

// ── 카운트다운 ────────────────────────────────────────────────
function countdown(){
  ST='cd';
  const el=document.getElementById('cdNum');
  let n=3;
  const tick=()=>{
    el.textContent=n>0?n:'GO!';
    el.style.opacity=1;el.style.transition='none';
    setTimeout(()=>{
      el.style.transition='opacity .35s';el.style.opacity=0;
      n--;
      if(n>=0)setTimeout(tick,600);
      else{el.textContent='';ST='play';lastT=performance.now();animId=requestAnimationFrame(loop);}
    },380);
  };
  tick();
}

// ── 메인 루프 ─────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min(ts-lastT,50);lastT=ts;
  if(ST==='play')update(dt);
  render3D();
  animId=requestAnimationFrame(loop);
}

// ── 업데이트 ──────────────────────────────────────────────────
function update(dt){
  FR++;

  // 무적 타이머
  if(invincible){invTimer-=dt;if(invTimer<=0)invincible=false;}

  // 속도
  const baseMax=6+dist/500; const capSpd=Math.min(baseMax,15);
  let tgtSpd=capSpd;
  if(evActive&&curEv&&!pw[curEv.item]){
    tgtSpd=capSpd*0.40;
    document.getElementById('slowOv').className='on';
  } else {
    document.getElementById('slowOv').className='';
  }
  spd+=(tgtSpd-spd)*0.04;

  // 조향 (버튼 누르고 있으면 이동)
  const steerStr=0.07*(spd/7+0.5);
  if(kL) tCarX=Math.max(-5.5,tCarX-steerStr);
  if(kR) tCarX=Math.min( 5.5,tCarX+steerStr);
  // 손 떼면 중앙으로 살짝 복귀
  if(!kL&&!kR) tCarX*=0.97;
  carX+=(tCarX-carX)*0.18;
  carMesh.position.x=carX;

  // 차량 기울임
  const tilt=kL?0.12:kR?-0.12:0;
  carMesh.rotation.z+=(tilt-carMesh.rotation.z)*0.15;

  // 차량 도로 이탈 시 감속
  if(Math.abs(carX)>ROAD_W/2) spd*=0.93;

  // 전진
  const mv=spd*0.36*(dt/16);
  dist+=spd*0.08; score+=Math.floor(spd*0.6); pos+=mv;

  // 커브 (도로 그룹 이동)
  curveT+=dt;
  if(curveT>curveDur){
    curveT=0;curveDur=3000+Math.random()*4000;
    curvePow=(Math.random()-.5)*0.05;
  }
  // 도로 자체를 좌우로 이동시켜 커브 표현
  const roadShift=curvePow*spd*0.3*(dt/16);
  roadTiles.forEach(t=>t.position.x+=roadShift);
  // 잔디/배경도 같이
  if(Math.abs(roadTiles[0].position.x)>30) roadTiles.forEach(t=>t.position.x*=0.92);

  // 타일 재활용
  roadTiles.forEach(tile=>{
    tile.position.z+=mv;
    if(tile.position.z>30){
      let minZ=Infinity;
      roadTiles.forEach(t=>{if(t.position.z<minZ)minZ=t.position.z;});
      tile.position.z=minZ-TILE_LEN;
      placeTileObjects(tile);
    }
  });

  // 오브젝트 처리 (픽업/충돌)
  roadTiles.forEach(tile=>{
    // 아이템 빌보드 + 부유 애니 + 픽업
    if(tile.userData.itemActive&&tile.userData.itemMesh){
      const m=tile.userData.itemMesh;
      m.lookAt(camera.position);
      m.position.y=1.6+Math.sin(FR*0.09)*0.28;
      // 픽업 거리
      const wp=new THREE.Vector3();
      m.getWorldPosition(wp);
      const dx=wp.x-carMesh.position.x, dz=wp.z-carMesh.position.z;
      if(Math.sqrt(dx*dx+dz*dz)<2.4){
        activate(tile.userData.itemType);
        tile.remove(m);tile.userData.itemMesh=null;tile.userData.itemActive=false;
      }
    }
    // 장애물 빌보드 + 충돌
    if(tile.userData.obsActive&&tile.userData.obsMesh){
      const m=tile.userData.obsMesh;
      m.lookAt(camera.position);
      m.position.y=1.6+Math.sin(FR*0.07+1)*0.15;
      const wp=new THREE.Vector3();
      m.getWorldPosition(wp);
      const dx=wp.x-carMesh.position.x, dz=wp.z-carMesh.position.z;
      if(Math.sqrt(dx*dx+dz*dz)<2.1){
        if(!invincible){
          loseHP();
          tile.remove(m);tile.userData.obsMesh=null;tile.userData.obsActive=false;
        }
      }
    }
  });

  // 보호구 타이머
  ITEM_KEYS.forEach(k=>{
    if(pw[k]){
      pwT[k]-=dt;
      if(pwT[k]<=0){pw[k]=false;pwT[k]=0;updG();}
      else{
        const ids={h:'fH',g:'fG',s:'fS',b:'fB'};
        document.getElementById(ids[k]).style.width=(pwT[k]/PWD[k]*100)+'%';
      }
    }
  });

  // 이벤트
  nextEvIn-=dt;
  if(nextEvIn<=0&&!evActive)triggerEvent();
  if(evActive){evTimer-=dt;if(evTimer<=0)endEvent();}

  // 날씨
  if(evActive&&curEv)updateWeather(dt);

  // 핸들 표시 업데이트
  const wAngle=kL?-30:kR?30:0;
  document.getElementById('wheelDisp').style.transform=`rotate(${wAngle}deg)`;

  document.getElementById('scoreTxt').textContent=score.toLocaleString();
  document.getElementById('spdNum').textContent=Math.floor(spd*16);
}

// ── 렌더 ──────────────────────────────────────────────────────
function render3D(){
  // 카메라: 차 뒤 위에서 앞을 바라봄
  const tx=carMesh.position.x*0.5;
  camera.position.x+=(tx-camera.position.x)*0.1;
  camera.position.y=5.8;
  camera.position.z=carMesh.position.z+12;
  camera.lookAt(carMesh.position.x*0.3,1.2,carMesh.position.z-20);

  // 이벤트 하늘/안개
  let skyC=0x1a0a3a, fogC=0x1a0a3a, fogN=90, fogF=260;
  if(evActive&&curEv){
    if(curEv.id==='hail') {skyC=0x283848;fogC=0x283848;}
    if(curEv.id==='acid') {skyC=0x0e2a0a;fogC=0x0e2a0a;}
    if(curEv.id==='thorn'){skyC=0x2a1808;fogC=0x2a1808;}
    if(curEv.id==='fog')  {skyC=0x888880;fogC=0x888880;fogN=15;fogF=55;}
    if(curEv.id==='sand') {skyC=0x382808;fogC=0x382808;}
    if(curEv.id==='dark') {skyC=0x000008;fogC=0x000008;fogN=8;fogF=30;}
  }
  scene.background=new THREE.Color(skyC);
  scene.fog.color.set(fogC);scene.fog.near=fogN;scene.fog.far=fogF;

  renderer.render(scene,camera);
}

// ── 날씨 파티클 ───────────────────────────────────────────────
function spawnWeather(id){
  if(weatherPts){scene.remove(weatherPts);weatherPts=null;}
  const n={hail:300,acid:300,sand:300}[id]||0; if(!n)return;
  const pos=[];
  for(let i=0;i<n;i++) pos.push((Math.random()-.5)*40,2+Math.random()*16,(Math.random()-.5)*40+camera.position.z-15);
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  const colMap={hail:0xaaddff,acid:0x55ff55,sand:0xddaa44};
  const sizeMap={hail:0.2,acid:0.18,sand:0.14};
  weatherPts=new THREE.Points(geo,new THREE.PointsMaterial({color:colMap[id]||0xffffff,size:sizeMap[id]||0.15,transparent:true,opacity:0.88}));
  scene.add(weatherPts);
}
function updateWeather(dt){
  if(!weatherPts)return;
  const pa=weatherPts.geometry.attributes.position;
  const id=curEv.id;
  for(let i=0;i<pa.count;i++){
    if(id==='hail'||id==='acid'){pa.setY(i,pa.getY(i)-0.28);if(pa.getY(i)<0)pa.setY(i,15+Math.random()*4);}
    else if(id==='sand'){pa.setX(i,pa.getX(i)+0.35);if(pa.getX(i)>22)pa.setX(i,-22);}
  }
  pa.needsUpdate=true;
  weatherPts.position.z=camera.position.z-15;
}

// ── 이벤트 ────────────────────────────────────────────────────
function triggerEvent(){
  curEv=EVLIST[Math.floor(Math.random()*EVLIST.length)];
  evActive=true;evTimer=9000+Math.random()*6000;nextEvIn=16000+Math.random()*10000;
  document.getElementById('ebIcon').textContent=curEv.icon;
  document.getElementById('ebTxt').textContent=curEv.name;
  document.getElementById('ebSub').textContent=curEv.warn;
  const b=document.getElementById('evBanner');b.className='show';
  setTimeout(()=>b.className='',3200);
  spawnWeather(curEv.id);
}
function endEvent(){
  evActive=false;curEv=null;
  document.getElementById('slowOv').className='';
  if(weatherPts){scene.remove(weatherPts);weatherPts=null;}
}

// ── 보호구 ────────────────────────────────────────────────────
function activate(t){
  pw[t]=true;iCnt[t]++;pwT[t]=PWD[t];
  const m={h:'⛑️ 안전모 장착!',g:'🥽 보안경 장착!',s:'🦺 내화학복 장착!',b:'👟 안전화 장착!'};
  const c={h:'#ffdd00',g:'#00d4ff',s:'#00ff88',b:'#ff6b35'};
  showMsg(m[t],c[t]);updG();
}
function updG(){
  const mp={h:['gH','fH'],g:['gG','fG'],s:['gS','fS'],b:['gB','fB']};
  Object.entries(mp).forEach(([k,[g,f]])=>{
    document.getElementById(g).classList.toggle('on',pw[k]);
    if(!pw[k])document.getElementById(f).style.width='100%';
  });
}
function showMsg(txt,col){
  const el=document.getElementById('fmsg');
  el.textContent=txt;el.style.color=col;el.style.textShadow='0 0 16px '+col+'88';
  el.className='';void el.offsetWidth;el.className='show';
  setTimeout(()=>el.className='',1200);
}

// ── 게임오버 ──────────────────────────────────────────────────
function gameOver(){
  ST='over';if(animId)cancelAnimationFrame(animId);
  saveLoc(pName,pDept,score);
  if(typeof window.fbSave==='function')window.fbSave(pName,pDept,score);
  document.getElementById('finalScore').textContent=score.toLocaleString();
  document.getElementById('fDist').textContent=Math.floor(dist)+'m';
  document.getElementById('fHc').textContent=iCnt.h;
  document.getElementById('fGc').textContent=iCnt.g;
  document.getElementById('fSc').textContent=iCnt.s;
  document.getElementById('fBc').textContent=iCnt.b;
  show('gameOverScreen');
}

// ── 저장 ──────────────────────────────────────────────────────
function saveLoc(n,d,s){try{const k='sr7';const a=JSON.parse(localStorage.getItem(k)||'[]');a.push({name:n,dept:d,score:s});a.sort((x,y)=>y.score-x.score);localStorage.setItem(k,JSON.stringify(a.slice(0,10)));}catch(e){}}
function getLoc(){try{return JSON.parse(localStorage.getItem('sr7')||'[]');}catch(e){return[];}}
async function renderLB(){
  const tb=document.getElementById('lbBody');tb.innerHTML='';
  const list=typeof window.fbLoad==='function'?await window.fbLoad():getLoc();
  if(!list.length){tb.innerHTML='<tr><td colspan="3" class="lb-e">아직 기록 없음 🏁</td></tr>';return;}
  list.forEach((s,i)=>{
    const rc=i<3?['g','s','b'][i]:'';const md=i<3?['🥇','🥈','🥉'][i]:i+1;
    const tr=document.createElement('tr');
    tr.innerHTML='<td class="lbr '+rc+'">'+md+'</td><td><div class="lbn">'+s.name+'</div><div class="lbd">'+s.dept+'</div></td><td class="lbs">'+s.score.toLocaleString()+'</td>';
    tb.appendChild(tr);
  });
}

// ── 버튼 입력 ─────────────────────────────────────────────────
const btnL=document.getElementById('btnL');
const btnR=document.getElementById('btnR');
btnL.addEventListener('touchstart',e=>{e.preventDefault();kL=true;btnL.classList.add('pressed');},{passive:false});
btnL.addEventListener('touchend',e=>{e.preventDefault();kL=false;btnL.classList.remove('pressed');},{passive:false});
btnR.addEventListener('touchstart',e=>{e.preventDefault();kR=true;btnR.classList.add('pressed');},{passive:false});
btnR.addEventListener('touchend',e=>{e.preventDefault();kR=false;btnR.classList.remove('pressed');},{passive:false});
btnL.addEventListener('mousedown',()=>{kL=true;btnL.classList.add('pressed');});
btnL.addEventListener('mouseup',()=>{kL=false;btnL.classList.remove('pressed');});
btnR.addEventListener('mousedown',()=>{kR=true;btnR.classList.add('pressed');});
btnR.addEventListener('mouseup',()=>{kR=false;btnR.classList.remove('pressed');});
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')kL=true;if(e.key==='ArrowRight')kR=true;});
window.addEventListener('keyup', e=>{if(e.key==='ArrowLeft')kL=false;if(e.key==='ArrowRight')kR=false;});

// ── 초기화 ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  resize();
  window.addEventListener('resize',resize);
  // 초기 씬 렌더
  scene.background=new THREE.Color(0x1a0a3a);
  renderer.render(scene,camera);
});
</script>
